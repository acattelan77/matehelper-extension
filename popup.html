<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MateHelper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div class="brand">
          <img src="icons/icon-48.png" alt="" width="32" height="32">
          <div>
            <h1>MateHelper</h1>
            <p id="extensionVersion" class="version"></p>
          </div>
        </div>
      </header>

      <section class="setting action-setting" aria-label="Chrome spell check">
        <span>
          <strong>Chrome spell check</strong>
          <small>Open Chrome language settings to enable it</small>
        </span>
        <button type="button" id="openChromeLanguageSettings" aria-label="Open Chrome language settings" title="Open Chrome language settings">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M15 3h6v6"></path>
            <path d="M10 14 21 3"></path>
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          </svg>
        </button>
      </section>

      <label class="setting">
        <span>
          <strong>Set target language</strong>
          <small>Helps Chrome use the Matecat target language for spellcheck</small>
        </span>
        <input type="checkbox" id="spellcheck">
      </label>

      <label class="setting" id="enhancedSpellcheckSetting">
        <span>
          <strong>Enhanced Chrome spell check</strong>
          <small>Optional web service. Enables the same spell checker that's used in Google search.</small>
          <small id="enhancedSpellcheckStatus" class="setting-status" hidden></small>
        </span>
        <input type="checkbox" id="enhancedSpellcheck">
      </label>

      <label class="setting">
        <span>
          <strong>Clickable URLs</strong>
          <small>Turns URLs into actual links</small>
        </span>
        <input type="checkbox" id="linkifyUrls">
      </label>

      <label class="setting">
        <span>
          <strong>Diagnostics</strong>
          <small>Console details for debbugging</small>
        </span>
        <input type="checkbox" id="debugMode">
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
