<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MateHelper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon-48.png" alt="" width="32" height="32">
        <div>
          <h1>MateHelper</h1>
        </div>
      </header>

      <label class="setting">
        <span>
          <strong>Clickable URLs</strong>
          <small>Reference links</small>
        </span>
        <input type="checkbox" id="linkifyUrls">
      </label>

      <label class="setting">
        <span>
          <strong>Spellcheck</strong>
          <small>Target editor language</small>
        </span>
        <input type="checkbox" id="spellcheck">
      </label>

      <label class="setting" id="enhancedSpellcheckSetting">
        <span>
          <strong>Enhanced spell check</strong>
          <small id="enhancedSpellcheckStatus">Chrome web service</small>
        </span>
        <input type="checkbox" id="enhancedSpellcheck">
      </label>

      <label class="setting">
        <span>
          <strong>Diagnostics</strong>
          <small>Console details</small>
        </span>
        <input type="checkbox" id="debugMode">
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
